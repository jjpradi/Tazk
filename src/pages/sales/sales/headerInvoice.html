<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Invoice Template</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .header {
      position: fixed;
      top: 0;
      width: 100%;
      height: 100px;
      background-color: #f3f3f3;
      border-bottom: 1px solid #ccc;
      text-align: center;
      padding: 10px 0;
    }

    .content {
      margin-top: 120px;
      padding: 20px;
    }

    .page-break {
      page-break-before: always;
    }

    /* Print styles */
    @media print {
      body {
        margin: 0;
      }

      .header {
        position: fixed;
        top: 0;
      }

      .content {
        margin-top: 120px;
      }

      .page-break {
        page-break-before: always;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Company Name</h2>
    <p>123 Business Rd, City, Country</p>
  </div>

  <div class="content">
    <p>Page 1 content goes here...</p>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse potenti.</p>
  </div>

  <div class="page-break"></div>

  <div class="content">
    <p>Page 2 content goes here...</p>
    <p>More details about the invoice, delivery terms, etc.</p>
  </div>

  <div class="page-break"></div>

  <div class="content">
    <p>Page 3 content goes here...</p>
  </div>
</body>
</html>
