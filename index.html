       <script>
        const initAutoLogin = () => {
  try {
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('username');
    const password = urlParams.get('password');

    if (username && password) {
      // Store in sessionStorage for immediate access
      sessionStorage.setItem('auto_login_username', decodeURIComponent(username));
      sessionStorage.setItem('auto_login_password', decodeURIComponent(password));
      sessionStorage.setItem('auto_login_pending', 'true');

      console.log('Auto-login parameters detected and stored:', { username, password: '***' });
    }
  } catch (error) {
    console.error('Failed to initialize auto-login:', error);
  }
};

// Call immediately when script loads
initAutoLogin();

// Also call when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initAutoLogin);
} else {
  initAutoLogin();
}
    </script>
    <script type="module" src="/src/index.js"></script>
